    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --accent-yt: #ff0000;
            --accent-cf: #318CE7;
            --accent-game: #00f2fe;
            --bg-dark: #020617; /* Slate 950 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .liquid-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
            filter: url('#goo'); 
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at center, var(--c) 0%, transparent 70%);
            mix-blend-mode: screen;
            transition: transform 0.2s ease-out;
            will-change: transform, left, top;
        }

        .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            backdrop-filter: blur(50px) saturate(120%);
            -webkit-backdrop-filter: blur(50px) saturate(120%);
            background: radial-gradient(circle at 50% 50%, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.9) 100%);
            pointer-events: none;
        }

        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 var(--glass-highlight);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 60%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            transform: translateZ(1px);
        }

        .glass-panel:hover .glare { opacity: 1; }

        .link-block {
            display: flex;
            align-items: center;
            padding: 1.25rem 1.5rem;
            text-decoration: none;
            color: white;
            cursor: pointer;
            group: hover;
        }

        .link-block:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
        }

        .link-block.yt:hover { border-color: rgba(255, 0, 0, 0.5); box-shadow: 0 10px 30px rgba(255, 0, 0, 0.15); }
        .link-block.cf:hover { border-color: rgba(49, 140, 231, 0.5); box-shadow: 0 10px 30px rgba(49, 140, 231, 0.15); }
        .link-block.gh:hover { border-color: rgba(255, 255, 255, 0.4); box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1); }
        
        .avatar-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120%; height: 120%;
            background: radial-gradient(circle, rgba(0,242,254,0.3) 0%, transparent 70%);
            z-index: -1;
            border-radius: 50%;
            filter: blur(20px);
            animation: pulse-glow 4s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. LIQUID BLOBS BACKGROUND LOGIC
            const container = document.getElementById('blob-container');
            const colors = ['#00f2fe', '#318CE7', '#6b21a8', '#0f172a'];
            const numBlobs = 6; 
            const blobs = [];

            for (let i = 0; i < numBlobs; i++) {
                const blob = document.createElement('div');
                blob.classList.add('blob');
                
                const size = Math.random() * 300 + 200; 
                blob.style.width = `${size}px`;
                blob.style.height = `${size}px`;
                blob.style.setProperty('--c', colors[Math.floor(Math.random() * colors.length)]);
                
                container.appendChild(blob);

                blobs.push({
                    element: blob,
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 1.5,
                    size: size
                });
            }

            function animateBlobs() {
                blobs.forEach(b => {
                    b.x += b.vx;
                    b.y += b.vy;
                    if (b.x <= -b.size / 2 || b.x >= window.innerWidth - b.size / 2) b.vx *= -1;
                    if (b.y <= -b.size / 2 || b.y >= window.innerHeight - b.size / 2) b.vy *= -1;
                    b.element.style.transform = `translate(${b.x}px, ${b.y}px)`;
                });
                requestAnimationFrame(animateBlobs);
            }
            animateBlobs();

            // 2. 3D TILT EFFECT CHO CÁC BLOCK
            const tiltCards = document.querySelectorAll('.tilt-card');

            tiltCards.forEach(card => {
                const glare = card.querySelector('.glare');

                card.addEventListener('mousemove', (e) => {
                    // Nếu ở trên mobile thì hạn chế hiệu ứng tilt để tránh lag
                    if(window.innerWidth < 768) return; 

                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    const rotateX = ((y - centerY) / centerY) * -8; // Góc nghiêng nhẹ hơn cho block nhỏ
                    const rotateY = ((x - centerX) / centerX) * 8;

                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;

                    if(glare) {
                        glare.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.2) 0%, transparent 50%)`;
                    }
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                    if(glare) {
                        glare.style.background = `radial-gradient(circle at 50% 50%, rgba(255,255,255,0) 0%, transparent 50%)`;
                    }
                });
            });

            window.addEventListener('resize', () => {
                blobs.forEach(b => {
                    if (b.x > window.innerWidth) b.x = window.innerWidth - b.size;
                    if (b.y > window.innerHeight) b.y = window.innerHeight - b.size;
                });
            });
        });
    </script>
